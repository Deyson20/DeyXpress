<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Pro - DEYXPRESS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="productos.js"></script>
</head>

<body class="bg-slate-100 p-4 md:p-8 font-sans text-slate-900">
  <div class="max-w-6xl mx-auto">
    <div class="flex justify-between items-center mb-8 bg-white p-6 rounded-[2rem] shadow-sm">
      <div>
        <h1 class="text-2xl font-black text-slate-800 tracking-tighter uppercase">Deyxpress Admin</h1>
        <p id="productCount" class="text-indigo-600 font-bold text-xs uppercase"></p>
      </div>
      <button onclick="descargarArchivo()" class="bg-green-500 hover:bg-green-600 text-white px-6 py-3 rounded-xl font-black transition-all shadow-lg shadow-green-100 flex items-center gap-2 text-sm">
        <i class="fas fa-file-download"></i> DESCARGAR PRODUCTOS.JS
      </button>
    </div>
    
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <div class="lg:col-span-1">
        <div class="bg-white p-6 rounded-[2.5rem] shadow-xl sticky top-8 border border-white">
          <h2 id="formTitle" class="font-bold text-xl mb-6 flex items-center gap-2">
            <i class="fas fa-plus-circle text-indigo-600"></i> Nuevo Producto
          </h2>
          
          <div class="space-y-4">
            <input type="hidden" id="editIndex" value="-1">
            
            <div>
              <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Nombre</label>
              <input id="name" class="w-full p-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 shadow-inner">
            </div>
            
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Precio</label>
                <input id="price" type="number" class="w-full p-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 shadow-inner">
              </div>
              <div>
                <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Categoría</label>
                <input id="category" placeholder="Ej: Hogar" class="w-full p-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 shadow-inner">
              </div>
            </div>
            
            <div>
              <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Video (Link YouTube/Shorts)</label>
              <input id="video" placeholder="Link aquí" class="w-full p-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 shadow-inner">
            </div>
            
            <div>
              <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Variantes (Colores o Tallas - separar con coma)</label>
              <input id="variants" placeholder="Ej: Rojo, Azul, XL" class="w-full p-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 shadow-inner">
            </div>
            
            <div>
              <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Descripción (Usa Enter para párrafos)</label>
              <textarea id="desc" rows="5" class="w-full p-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 text-sm shadow-inner"></textarea>
            </div>
            
            <div>
              <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Imágenes (Una por línea)</label>
              <textarea id="imgs" rows="3" class="w-full p-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 text-xs shadow-inner"></textarea>
            </div>
            
            <button id="btnSave" onclick="guardarProducto()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-xl shadow-lg transition-all uppercase text-sm tracking-widest active:scale-95">
              Guardar Cambios
            </button>
            <button id="btnCancel" onclick="limpiarFormulario()" class="hidden w-full mt-2 bg-slate-100 text-slate-500 font-bold py-2 rounded-xl text-xs uppercase">
              Cancelar Edición
            </button>
          </div>
        </div>
      </div>
      
      <div class="lg:col-span-2">
        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm min-h-screen">
          <h2 class="font-bold text-xl mb-6 text-slate-800">Mis Productos</h2>
          <div id="adminList" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    // 1. Usamos tu enlace de Worker real
    const urlWorker = "https://deyson20.workers.dev/api/productos";
    let copiaProductos = [];
    
    // Función para cargar los productos apenas entras al Admin
    async function inicializarAdmin() {
      try {
        const res = await fetch(urlWorker);
        if (res.ok) {
          copiaProductos = await res.json();
          renderAdmin();
        }
      } catch (e) {
        console.error("Error al cargar productos:", e);
        // Si falla la nube, intentamos cargar del archivo local si existe
        if (typeof productos !== 'undefined') {
          copiaProductos = [...productos];
          renderAdmin();
        }
      }
    }
    
    function renderAdmin() {
      const listContainer = document.getElementById('adminList');
      const countLabel = document.getElementById('productCount');
      listContainer.innerHTML = "";
      countLabel.textContent = `${copiaProductos.length} Productos publicados`;
      
      copiaProductos.forEach((p, index) => {
        const div = document.createElement('div');
        div.className = "p-3 bg-white rounded-2xl flex gap-3 items-center border border-slate-100 hover:border-indigo-300 transition-all cursor-pointer group shadow-sm";
        div.onclick = (e) => { if (!e.target.closest('.btn-delete')) cargarParaEditar(index); };
        
        // Verificamos si hay imagen, si no ponemos una por defecto
        const imgUrl = (p.images && p.images.length > 0) ? p.images[0] : 'https://via.placeholder.com/150';
        
        div.innerHTML = `
        <img src="${imgUrl}" class="w-16 h-16 object-cover rounded-xl shadow-sm bg-white">
        <div class="flex-1 min-w-0">
          <p class="font-bold text-slate-800 truncate text-sm">${p.name}</p>
          <div class="flex justify-between items-center">
              <p class="text-xs font-bold text-indigo-600">$${p.price.toLocaleString()}</p>
              <span class="text-[9px] bg-slate-200 px-2 py-0.5 rounded text-slate-500 font-bold uppercase">${p.category}</span>
          </div>
        </div>
        <button onclick="event.stopPropagation(); eliminar(${index})" class="btn-delete p-3 text-slate-300 hover:text-red-500 transition-colors">
          <i class="fas fa-trash-alt text-lg"></i>
        </button>
      `;
        listContainer.appendChild(div);
      });
    }
    
    async function guardarProducto() {
      // CORRECCIÓN: Usamos los IDs correctos que tienes en tu HTML (desc, imgs)
      const idInput = document.getElementById('editIndex').value;
      const id = idInput === "-1" ? Date.now() : parseInt(idInput);
      
      const nuevoProducto = {
        id: id,
        name: document.getElementById('name').value,
        price: parseFloat(document.getElementById('price').value),
        category: document.getElementById('category').value,
        description: document.getElementById('desc').value, // Antes decía 'description'
        images: document.getElementById('imgs').value.split('\n').filter(i => i.trim() !== ""), // Antes decía 'images'
        video: document.getElementById('video').value,
        variants: document.getElementById('variants').value.split(',').map(v => v.trim())
      };
      
      try {
        const response = await fetch(urlWorker, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(nuevoProducto)
        });
        
        if (response.ok) {
          alert("¡Producto guardado en la NUBE con éxito!");
          location.reload();
        } else {
          alert("Error al guardar en el servidor");
        }
      } catch (error) {
        console.error("Error al guardar:", error);
        alert("No se pudo conectar con el servidor (Worker)");
      }
    }
    
    function cargarParaEditar(index) {
      const p = copiaProductos[index];
      document.getElementById('editIndex').value = p.id; // Guardamos el ID real
      document.getElementById('name').value = p.name;
      document.getElementById('price').value = p.price;
      document.getElementById('category').value = p.category;
      document.getElementById('video').value = p.video || "";
      document.getElementById('variants').value = p.variants ? p.variants.join(', ') : "";
      document.getElementById('imgs').value = Array.isArray(p.images) ? p.images.join('\n') : p.images;
      document.getElementById('desc').value = p.description;
      
      document.getElementById('formTitle').innerHTML = `<i class="fas fa-edit text-orange-500"></i> Editando Producto`;
      document.getElementById('btnSave').textContent = "ACTUALIZAR EN LA NUBE";
      document.getElementById('btnSave').classList.replace('bg-indigo-600', 'bg-orange-500');
      document.getElementById('btnCancel').classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    function limpiarFormulario() {
      document.getElementById('editIndex').value = "-1";
      document.querySelectorAll('input, textarea').forEach(el => el.value = "");
      document.getElementById('formTitle').innerHTML = `<i class="fas fa-plus-circle text-indigo-600"></i> Nuevo Producto`;
      document.getElementById('btnSave').textContent = "GUARDAR CAMBIOS";
      document.getElementById('btnSave').classList.replace('bg-orange-500', 'bg-indigo-600');
      document.getElementById('btnCancel').classList.add('hidden');
    }
    
    // Iniciamos la carga
    inicializarAdmin();
  </script>
  
</body>

</html>
