<!DOCTYPE html>
<html lang="es">

<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    
    <title>DEYXPRESS Admin</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Quill -->
    <link href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.snow.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.js"></script>
    
</head>

<body class="bg-slate-100 min-h-screen">
    
    <div class="flex min-h-screen relative">
        
        <!-- Sidebar -->
        <!-- Botón menú móvil -->
        
        <div id="overlay" class="hidden fixed inset-0 bg-black/50 z-30"></div>
        
        <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 z-40 w-64 bg-slate-900 text-white transform -translate-x-full lg:translate-x-0 transition-transform duration-300 flex flex-col">
            <div class="p-6 border-b border-slate-800">
                <img src="https://i.postimg.cc/X7Vq6JKD/logo.png" class="h-10 w-auto object-contain mb-1" alt="Logo Deyxpress">
                
                
                
                
                
                <p class="text-slate-400 text-sm mt-1">Panel Administrativo</p>
            </div>
            <nav class="flex-1 p-4 space-y-2">
                <button id="btnVistaProductos" onclick="cambiarVista('productos')" class="w-full text-left bg-indigo-600 px-4 py-3 rounded-xl font-semibold transition-all">
                    📦 Productos
                </button>
                <button id="btnVistaConfig" onclick="cambiarVista('configuracion')" class="w-full text-left hover:bg-slate-800 text-slate-300 px-4 py-3 rounded-xl transition-all">
                    ⚙ Configuración
                </button>
                <button onclick="cerrarSesionAdmin()" class="w-full text-left text-red-400 hover:bg-slate-800 px-4 py-3 rounded-xl font-semibold mt-auto flex items-center gap-2">
                    🚪 Cerrar Sesión
                </button>
            </nav>
            
        </aside>
        
        <main class="flex-1 w-full p-4 md:p-6 lg:p-8 lg:ml-0">
            
            <div class="bg-white/80 backdrop-blur-md rounded-2xl border border-slate-100 p-4 mb-6 shadow-sm flex items-center justify-between sticky top-4 z-20">
                <div class="flex items-center gap-3">
                    <button id="menuBtn" class="lg:hidden text-slate-900 hover:bg-slate-100 p-2 rounded-xl text-xl transition font-bold leading-none">
                        ☰
                    </button>
                    <div class="hidden lg:block w-2.5 h-6 bg-slate-900 rounded-full"></div>
                    <div>
                        <img src="https://i.postimg.cc/X7Vq6JKD/logo.png" class="h-6 sm:h-7 object-contain mb-0.5" alt="Logo Deyxpress">
                        
                        
                        <p class="text-[9px] sm:text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">PANEL ADMINISTRATIVO</p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button id="btnGuardar" onclick="guardarProducto()" class="bg-slate-900 hover:bg-slate-800 text-white px-3 sm:px-4 py-2 rounded-xl text-[11px] font-bold uppercase tracking-wider shadow transition">
                        + Nuevo
                    </button>
                    <button onclick="limpiarFormulario()" class="bg-white border border-slate-300 hover:bg-slate-100 text-slate-700 px-3 sm:px-4 py-2 rounded-xl text-[11px] font-bold uppercase tracking-wider transition">
                        Limpiar
                    </button>
                </div>
            </div>
            
            
            
            <!-- Tarjetas -->
            
            <!-- CONTENEDOR VISTA PRODUCTOS -->
<div id="vistaProductos">


            
            <div class="grid md:grid-cols-3 gap-5 mb-8">
                
                <div class="bg-white rounded-2xl shadow p-6">
                    
                    <div class="text-slate-400 text-sm">
                        Productos
                    </div>
                    
                    <div id="totalProductos" class="text-3xl font-black mt-2">
                        --
                    </div>
                    
                </div>
                
                <div class="bg-white rounded-2xl shadow p-6">
                    
                    <div class="text-slate-400 text-sm">
                        Categorías
                    </div>
                    
                    <div id="totalCategorias" class="text-3xl font-black mt-2">
                        --
                    </div>
                    
                </div>
                
                <div class="bg-white rounded-2xl shadow p-6">
                    
                    <div class="text-slate-400 text-sm">
                        Precio promedio
                    </div>
                    
                    <div id="precioPromedio" class="text-3xl font-black mt-2">
                        --
                    </div>
                    
                </div>
                
            </div>
            
            <!-- Formulario -->
            
            <div class="bg-white rounded-2xl shadow p-8 mb-8">
                
                <h3 class="text-xl font-bold mb-6">
                    Información del producto
                </h3>
                
                <div class="grid md:grid-cols-2 gap-4">
                    
                    <input id="name" class="border rounded-xl p-3" placeholder="Nombre">
                    
                    <input id="price" type="number" class="border rounded-xl p-3" placeholder="Precio">
                    
                    <input id="oldPrice" type="number" class="border rounded-xl p-3" placeholder="Precio anterior">
                    
                    <input id="category" class="border rounded-xl p-3" placeholder="Categoría">
                    
                    <input id="origin" class="border rounded-xl p-3" placeholder="Origen">
                    
                    <input id="bodegaName" class="border rounded-xl p-3" placeholder="Bodega">
                    
                    <input id="video" class="border rounded-xl p-3" placeholder="Video">
                    
                    <select id="freeShipping" class="border rounded-xl p-3 bg-white" required>
                    
                        <option value="" disabled selected hidden>Selecciona Envío Gratis</option>
                        <option value="true">Sí</option>
                        <option value="false">No</option>
                        
                    </select>
                    
                    
                    <div class="md:col-span-2">
                        
                        <label class="block font-semibold mb-2 text-slate-700">
                        
                            Descripción del producto
                            
                        </label>
                        
                        <div id="editor" class="bg-white rounded-xl h-72">
                            
                        </div>
                        
                        <div class="mt-6">
                            
                            <h4 class="font-bold text-slate-700 mb-3">
                                
                                Vista previa
                                
                            </h4>
                            
                            <div id="previewDescripcion" class="bg-slate-50 rounded-2xl border p-6 prose max-w-none">
                                
                            </div>
                            
                        </div>
                        
                    </div>
                    
                    <textarea id="images" class="border rounded-xl p-3 md:col-span-2 h-24" placeholder="https://imagen1.jpg, https://imagen2.jpg"></textarea>
                    
                    <textarea id="variants" class="border rounded-xl p-3 md:col-span-2 h-24" placeholder="Rojo, Azul, Negro"></textarea>
                    
                </div>
                
            </div>
            
            <!-- Lista -->
            
            <div class="bg-white rounded-2xl shadow p-8">
                
                <div class="flex justify-between items-center mb-6">
                    
                    <h3 class="text-xl font-bold">
                        Productos registrados
                    </h3>
                    
                    <input id="buscar" placeholder="Buscar..." class="border rounded-xl px-4 py-2 w-72">
                    
                </div>
                
                <div id="lista"></div>
                
            </div>
            
            </div> <!-- FIN DE VISTA PRODUCTOS -->

<!-- CONTENEDOR VISTA CONFIGURACIÓN (OCULTO POR DEFECTO) -->
<div id="vistaConfiguracion" class="hidden animate-fade-in">
    <div class="bg-white rounded-2xl shadow p-8 max-w-xl mx-auto">
        <div class="mb-6">
            <h3 class="text-2xl font-black text-slate-800">Seguridad de la Cuenta</h3>
            <p class="text-sm text-slate-500 mt-1">Actualiza tu nombre de usuario administrador y clave de acceso al sistema.</p>
        </div>

        <form id="configForm" class="space-y-5" onsubmit="cambiarCredencialesAdmin(event)">
            <div>
                <label class="block text-xs font-bold uppercase text-slate-500 mb-1.5">Usuario Actual</label>
                <input type="text" id="currentUsername" required autocomplete="username"
                       class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-slate-900 focus:outline-none text-sm bg-slate-50">
            </div>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1.5">Nuevo Nombre de Usuario</label>
                    <input type="text" id="newUsername" required autocomplete="new-username"
                           class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-slate-900 focus:outline-none text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1.5">Nueva Contraseña (mín. 6 caracteres)</label>
                    <input type="password" id="newPassword" required autocomplete="new-password" minlength="6"
                           class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-slate-900 focus:outline-none text-sm">
                </div>
            </div>

            <div id="configMessage" class="hidden text-xs font-bold p-3 rounded-xl text-center"></div>

            <button type="submit" id="btnConfigSubmit"
                    class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold text-sm hover:bg-slate-800 transition shadow-md">
                Guardar Nuevas Credenciales
            </button>
        </form>
    </div>
</div>

            
        </main>
        
    </div>
    
    <script>
        const menuBtn = document.getElementById("menuBtn");
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("overlay");
        
        menuBtn.addEventListener("click", () => {
            
            sidebar.classList.remove("-translate-x-full");
            overlay.classList.remove("hidden");
            
        });
        
        overlay.addEventListener("click", () => {
            
            sidebar.classList.add("-translate-x-full");
            overlay.classList.add("hidden");
            
        });
        
        window.addEventListener("resize", () => {
            
            if (window.innerWidth >= 1024) {
                
                overlay.classList.add("hidden");
                
                sidebar.classList.remove("-translate-x-full");
                
            } else {
                
                sidebar.classList.add("-translate-x-full");
                
            }
            
        });
        
        // NUEVA FUNCIÓN: Destruye la cookie y recarga para bloquear el panel
        window.cerrarSesionAdmin = async function() {
            try {
                // Le pedimos al servidor que destruya la cookie HttpOnly
                await fetch("/api/login", { method: "DELETE" });
            } catch (err) {
                console.error("Error al cerrar sesión:", err);
            }
            
            // Pase lo que pase, recargamos la página para que el Middleware lo bote al login
            location.reload();
        };
    </script>
    
    <script src="admin.js"></script>
    
</body>

</html>
